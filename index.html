<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Account Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./docs/Style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="min-h-screen bg-[var(--surface-bg)] text-[var(--ink)] md:page-backdrop">
    <div id="loginToast" aria-live="polite"
        class="pointer-events-none fixed right-4 top-4 z-50 translate-y-2 opacity-0 transition-all duration-300 sm:right-6 sm:top-6">
        <div
            class="flex items-center gap-3 rounded-[20px] bg-[var(--ink)] px-4 py-3 text-white shadow-2xl ring-1 ring-white/10">
            <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[var(--brand)] text-white">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <div>
                <p class="text-sm font-bold">Login submitted</p>
                <p class="text-xs text-white/70">Your details were received successfully.</p>
            </div>
        </div>
    </div>

    <main class="mx-auto flex min-h-screen max-w-7xl items-center justify-center px-4 py-4 sm:px-6 lg:px-8">
        <section class=" w-full md:bg-white/80 max-w-xl overflow-hidden md:rounded-[32px]">
            <div class=" px-1 py-8 sm:px-8 sm:py-10 lg:px-12 lg:py-12">
                <div class="mx-auto w-full max-w-md">
                    <div class="mb-8 text-center">
                        <div class="mb-6 flex justify-center">
                            <img src="/docs/images/logo.svg" alt="Logo" class="h-12 w-auto" />
                        </div>

                        <p class="text-xs font-bold uppercase tracking-[0.24em] text-[var(--brand)]">Welcome back</p>
                        <h2
                            class="display-font mt-3 text-3xl font-semibold leading-none tracking-[-0.02em] text-[var(--navy)] sm:text-4xl">
                            Sign in to your account
                        </h2>
                        <p class="mt-4 text-sm text-[var(--muted)] sm:text-[0.98rem]">
                            Use your registered email address and password to continue to your secure dashboard.
                        </p>
                    </div>

                    <div
                        class="mb-6 flex items-center justify-center gap-3 rounded-xl border border-stone-200 bg-white/80 px-4 py-4 text-center">
                        <div class="flex items-center gap-1 text-[#00b67a]">
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                            <i class="fa-solid fa-star"></i>
                        </div>
                        <p class="text-sm font-semibold text-[var(--muted)]">
                            Rated Excellent on <span class="font-bold text-[#00b67a]">Trustpilot</span>
                        </p>
                    </div>

                    <form id="loginForm" class="space-y-5">
                        <div class="space-y-2">
                            <label for="email"
                                class="block text-sm tracking-[0.02em] text-[var(--navy)]">Email
                                address</label>
                            <div class="relative">
                                <span
                                    class="pointer-events-none absolute left-5 top-1/2 z-10 -translate-y-1/2 text-[var(--brand)]">
                                    <i class="fa-regular fa-envelope"></i>
                                </span>
                                <input id="email" name="email" type="email" autocomplete="email"
                                    placeholder="Enter your email address"
                                    class="w-full rounded-xl border border-stone-300 bg-white py-3 pl-14 pr-5 text-base text-[var(--ink)] outline-none transition placeholder:text-stone-400 focus:-translate-y-0.5 focus:border-[var(--brand)] focus:ring-4 focus:ring-[rgba(255,98,0,0.15)]"
                                    required />
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label for="password"
                                class="block text-sm tracking-[0.02em] text-[var(--navy)]">Password</label>
                            <div class="relative">
                                <span
                                    class="pointer-events-none absolute left-5 top-1/2 z-10 -translate-y-1/2 text-[var(--brand)]">
                                    <i class="fa-solid fa-lock"></i>
                                </span>
                                <input id="password" name="password" type="password" autocomplete="current-password"
                                    placeholder="Enter your password"
                                    class="w-full rounded-xl border border-stone-300 bg-white py-3 pl-14 pr-5 text-base text-[var(--ink)] outline-none transition placeholder:text-stone-400 focus:-translate-y-0.5 focus:border-[var(--brand)] focus:ring-4 focus:ring-[rgba(255,98,0,0.15)]"
                                    required />
                            </div>
                        </div>

                        <div
                            class="flex flex-col gap-3 pt-1 text-sm text-[var(--muted)] sm:flex-row sm:items-center sm:justify-between">
                            <label class="inline-flex items-center gap-3 font-medium">
                                <input type="checkbox" class="h-4 w-4 accent-[#ff6200]" />
                                <span>Remember this device</span>
                            </label>
                            <a href="#"
                                class="font-bold text-[var(--brand)] transition hover:text-[var(--brand-deep)]">Forgot
                                password?</a>
                        </div>

                        <button type="submit"
                            class="brand-shadow w-full rounded-xl bg-gradient-to-r from-[var(--brand)] to-[var(--brand-deep)] px-6 py-3 tracking-wide cursor-pointer text-white transition hover:opacity-90 ">
                            Sign In Securely
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="./docs/javascript/login-form.js" defer></script>
</body>

</html>
